; NULL City Badge — PlatformIO project
; ESP32-S3-WROOM-1-N8R8 (8 MB flash, 8 MB OPI PSRAM)
; Upload via CH340C on /dev/ttyUSB0

[env:null-city-badge]
platform          = espressif32
board             = esp32-s3-devkitc-1
framework         = arduino

; 8 MB flash with default partition layout
board_build.flash_size    = 8MB
board_build.partitions    = default_8MB.csv

; UART upload through CH340C — hold BOOT then press RST if auto-reset fails
upload_port       = /dev/ttyUSB0
upload_protocol   = esptool
monitor_port      = /dev/ttyUSB0
monitor_speed     = 115200

; Disable USB-CDC (we use the CH340C UART, not the S3 native USB)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    ZinggJM/GxEPD2 @ ^1.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.16.1
    sparkfun/SparkFun ATECCX08a Arduino Library @ ^1.3.1
